name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A new push to a PR makes the in-flight run obsolete.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm ci` installs the linux-x64 lancedb binary via optional deps.
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run check-types

      - name: Test
        run: npm test

      # Catches bundler-only breakage (e.g. a wrongly externalized dependency)
      # that lint and vitest cannot see.
      - name: Build
        run: npm run build
