name: Release

on:
  # Tag a commit to cut a release: `git tag v0.1.0 && git push origin v0.1.0`
  push:
    tags: ['v*']
  # Or build installable vsix files on demand, without publishing a release.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify before packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm test

  package:
    name: Package ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each target builds on its native runner, so `npm ci` installs the
          # correct @lancedb/lancedb-* native binary via optional dependencies.
          # Cross-installing native optional deps is fragile; this avoids it.
          - target: darwin-arm64
            os: macos-14
          - target: linux-x64
            os: ubuntu-latest
          - target: win32-x64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # tree-sitter grammars ship prebuilds for every platform; a targeted vsix
      # loads exactly one. Dropping the rest saves ~30 MB per artifact.
      - name: Prune foreign native prebuilds
        shell: bash
        run: node scripts/prune-native-prebuilds.mjs ${{ matrix.target }}

      - name: Resolve version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Unsigned by design: no publisher certificate, no marketplace publish.
      # The .vsix installs via "Extensions: Install from VSIX..." or
      # `code --install-extension <file>`.
      - name: Package vsix
        shell: bash
        run: |
          npx vsce package \
            --target ${{ matrix.target }} \
            --out crucible-${{ steps.version.outputs.version }}-${{ matrix.target }}.vsix

      - name: Verify the vsix is loadable
        shell: bash
        run: node scripts/verify-vsix.mjs crucible-${{ steps.version.outputs.version }}-${{ matrix.target }}.vsix ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: crucible-${{ matrix.target }}
          path: '*.vsix'
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach vsix files to the GitHub release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.vsix
          generate_release_notes: true
          fail_on_unmatched_files: true
